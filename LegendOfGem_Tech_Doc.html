<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Legend of Gem — 기술문서</title>
<link rel="stylesheet" href="css/colors_and_type.css?v=2">
<link rel="stylesheet" href="css/techdoc.tokens.css?v=1">
<link rel="stylesheet" href="css/techdoc.frame.css?v=1">
<link rel="stylesheet" href="css/techdoc.content.css?v=1">
<link rel="stylesheet" href="css/techdoc.pages.css?v=1">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="legendofgem.data.js"></script>
<script src="components/techdoc/utils/csharpHighlight.js"></script>
<script src="components/techdoc/utils/pageIndicator.js"></script>
<script src="components/techdoc/utils/responsiveScale.js"></script>

<script type="text/babel" src="components/techdoc/TechDocAtoms.jsx"></script>
<script type="text/babel" src="components/techdoc/CoverPage.jsx"></script>
<script type="text/babel" src="components/techdoc/OverviewPage.jsx"></script>
<script type="text/babel" src="components/techdoc/FeatureCoverPage.jsx"></script>
<script type="text/babel" src="components/techdoc/StructurePage.jsx"></script>
<script type="text/babel" src="components/techdoc/DetailDecisionPage.jsx?v=4"></script>
<script type="text/babel" src="components/techdoc/DetailCodePage.jsx"></script>
<script type="text/babel" src="components/techdoc/TroubleshootPage.jsx"></script>
<script type="text/babel" src="components/techdoc/RetrospectivePage.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const RENDERERS = {
    cover:        function (p, t) { return <CoverPage          key={p.id} page={p} total={t} />; },
    overview:     function (p, t) { return <OverviewPage       key={p.id} page={p} total={t} />; },
    featureCover: function (p, t) { return <FeatureCoverPage   key={p.id} page={p} total={t} />; },
    structure:    function (p, t) { return <StructurePage      key={p.id} page={p} total={t} />; },
    decision:     function (p, t) { return <DetailDecisionPage key={p.id} page={p} total={t} />; },
    codeTabs:     function (p, t) { return <DetailCodePage     key={p.id} page={p} total={t} />; },
    troubleshoot: function (p, t) { return <TroubleshootPage   key={p.id} page={p} total={t} />; },
    retro:        function (p, t) { return <RetrospectivePage  key={p.id} page={p} total={t} />; },
};

function App() {
    const { meta, pages } = window.TECHDOC;
    const total = pages.length;
    React.useEffect(function () {
        window.TechDocUtils.initPageIndicator();
        window.TechDocUtils.initResponsiveScale();
    }, []);
    return (
        <React.Fragment>
            <TDUtilityBar meta={meta} />
            {pages.map(function (page) {
                var render = RENDERERS[page.type];
                return render ? render(page, total) : null;
            })}
        </React.Fragment>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
