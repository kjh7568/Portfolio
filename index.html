<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>김지훈 — Unity Client Developer · Portfolio 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css?v=2">
<link rel="stylesheet" href="styles.css?v=3">
<link rel="stylesheet" href="pages.css?v=5">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=3"></script>
<script type="text/babel" src="components/Atoms.jsx?v=2"></script>
<script type="text/babel" src="components/CoverPage.jsx?v=2"></script>
<script type="text/babel" src="components/AboutPage.jsx?v=3"></script>
<script type="text/babel" src="components/TechStackPage.jsx?v=2"></script>
<script type="text/babel" src="components/TimelinePage.jsx?v=3"></script>
<script type="text/babel" src="components/ProjectPages.jsx?v=2"></script>
<script type="text/babel" src="components/ClosingPage.jsx?v=2"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
function App() {
  const projects = window.PROJECTS;
  // Page count calculation:
  // 1: Cover, 2: About, 3: Tech, 4: Timeline,
  // 5..18: 7 projects × 2 pages = 14 pages
  // 19: Closing
  const total = 4 + projects.length * 2 + 1; // = 19

  let idx = 0;
  const pages = [];

  // 1
  idx++; pages.push(<CoverPage key="cover" />);
  // 2
  idx++; pages.push(<AboutPage key="about" pageIdx={idx} total={total} />);
  // 3
  idx++; pages.push(<TechStackPage key="tech" pageIdx={idx} total={total} />);
  // 4
  idx++; pages.push(<TimelinePage key="timeline" pageIdx={idx} total={total} projects={projects} />);
  // 5..18
  projects.forEach((p) => {
    idx++; pages.push(<ProjectOverviewPage key={p.id+"-o"} pageIdx={idx} total={total} project={p} />);
    idx++; pages.push(<ProjectFeaturesPage key={p.id+"-f"} pageIdx={idx} total={total} project={p} />);
  });
  // 19
  idx++; pages.push(<ClosingPage key="closing" pageIdx={idx} total={total} />);

  return (
    <React.Fragment>
      {pages}
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
